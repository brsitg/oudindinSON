<!DOCTYPE html>
<html>
<head>
    <title>my epic website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        h1, h2 {
            position: absolute;
            z-index: 2;
            color: white;
            margin-left: 20px;
        }

        h1 {
            top: 10px;
        }

        h2 {
            top: 60px;
        }

        .gallery img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: fill; /* changed from cover to fill */
            z-index: 1;
        }
    </style>
</head>

<body>
    <h1>welcome to my epic website</h1>
    <h2>oudindinSON</h2>

    <div class="gallery">
        <img src="https://i.imgur.com/IkgrUtk.jpg" alt="oudindinSON">
    </div>

</body>
</html>
